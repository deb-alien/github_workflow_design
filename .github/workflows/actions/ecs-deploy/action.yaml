name: ECS Deploy

description: Deploy a Docker image to Amazon ECS

inputs:
    cluster:
        required: true

    service:
        required: true

    task-definition-family:
        required: true

    image-uri:
        required: true

    container-name:
        required: true

    rollback-on-failure:
        required: false
        default: 'true'

outputs:
    task-definition-arn:
        value: ${{ steps.deploy.outputs.task-definition-arn }}

runs:
    using: composite

    steps:
        - name: Make scripts executable
          shell: bash
          run: |
              chmod +x "${{ github.action_path }}/scripts/"*.sh

        ############################################################
        # Save currently deployed Task Definition
        ############################################################

        - name: Get Current Task Definition
          id: current
          shell: bash
          run: |
              CURRENT_TASK=$(aws ecs describe-services \
                --cluster "${{ inputs.cluster }}" \
                --services "${{ inputs.service }}" \
                --query "services[0].taskDefinition" \
                --output text)

              echo "task-definition=$CURRENT_TASK" >> "$GITHUB_OUTPUT"

        ############################################################
        # Download current Task Definition JSON
        ############################################################

        - name: Download Task Definition
          shell: bash
          run: |
              aws ecs describe-task-definition \
                --task-definition "${{ inputs.task-definition-family }}" \
                --query taskDefinition \
                > task-definition.json

        ############################################################
        # Replace container image
        ############################################################

        - name: Render Task Definition
          id: render
          uses: aws-actions/amazon-ecs-render-task-definition@v1
          with:
              task-definition: task-definition.json
              container-name: ${{ inputs.container-name }}
              image: ${{ inputs.image-uri }}

        ############################################################
        # Deploy
        ############################################################

        - name: Deploy ECS Service
          id: deploy
          uses: aws-actions/amazon-ecs-deploy-task-definition@v2
          continue-on-error: true
          with:
              task-definition: ${{ steps.render.outputs.task-definition }}
              cluster: ${{ inputs.cluster }}
              service: ${{ inputs.service }}
              wait-for-service-stability: true

        ############################################################
        # Rollback
        ############################################################

        - name: Rollback Deployment
          if: failure() && inputs.rollback-on-failure == 'true'
          shell: bash
          run: |
              "${{ github.action_path }}/scripts/rollback.sh" \
                "${{ inputs.cluster }}" \
                "${{ inputs.service }}" \
                "${{ steps.current.outputs.task-definition }}"
