name: Build and Push Docker Image to ECR
description: Build a Docker image and push it to Amazon ECR

inputs:
    registry:
        description: 'The Amazon ECR registry URL'
        required: true
    repository:
        description: 'The Amazon ECR repository name'
        required: true
    dockerfile:
        description: 'The path to the Dockerfile'
        required: false
        default: Dockerfile
    context:
        description: 'The build context for the Docker image'
        required: false
        default: backend
    build_args:
        description: 'Build arguments for the Docker build'
        required: false
        default: ''

outputs:
    image_uri:
        description: 'The full URI of the pushed Docker image'
        value: ${{ steps.build.outputs.image_uri }}
    image_tag:
        description: 'The tag of the pushed Docker image'
        value: ${{ steps.build.outputs.image_tag }}

runs:
    using: composite
    steps:
        - uses: docker/setup-buildx-action@v4
        - id: build
          shell: bash
          working-directory: ${{ inputs.context }}
          run: |
              REPOSITORY="${{ inputs.repository }}"
              REGISTRY="${{ inputs.registry }}"
              IMAGE_TAG="${GITHUB_SHA::8}"
              FULL_IMAGE_URI="$REGISTRY/$REPOSITORY:$IMAGE_TAG"

              DOCKER_BUILD_FLAGS=()
              if [ -n "${{ inputs.build_args }}" ]; then
                for arg in ${{ inputs.build_args }}; do
                DOCKER_BUILD_FLAGS+=(--build-arg "$arg")
                done
              fi

              echo "Compiling container layers using Buildx: $FULL_IMAGE_URI"

              docker buildx build \                 # Build the Docker image using Buildx
                --file "${{ inputs.dockerfile }}" \ # Dockerfile path
                "${DOCKER_BUILD_FLAGS[@]}" \        # Build arguments
                --tag "$FULL_IMAGE_URI" \           # Tagging the image with the full URI
                --push \                            # Push the image to the registry
                --cache-from=type=gha \             # Use GitHub Actions cache for build layers
                --cache-to=type=gha,mode=max \      # Store build cache in GitHub Actions
                .                                   # Build context

               echo "Pushing image to Amazon ECR..."
               docker push "$FULL_IMAGE_URI"

               echo "image_uri=$FULL_IMAGE_URI" >> $GITHUB_OUTPUT
               echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
