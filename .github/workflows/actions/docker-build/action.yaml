name: Build and Push Docker Image to ECR
description: Build a Docker image and push it to Amazon ECR

inputs:
    registry:
        description: 'The Amazon ECR registry URL'
        required: true

    repository:
        description: 'The Amazon ECR repository name'
        required: true

    dockerfile:
        description: 'The path to the Dockerfile'
        required: false
        default: Dockerfile

    context:
        description: 'The build context for the Docker image'
        required: false
        default: .

    image_tag:
        description: 'The tag for the Docker image'
        required: false
        default: ''

    build_args:
        description: 'Build arguments for the Docker build'
        required: false
        default: ''

runs:
    using: composite
    steps:
        - id: build
          shell: bash
          run: |
              IMAGE_URI="${{ inputs.registry }}/${{ inputs.repository }}:${{ inputs.image_tag }}"

              docker build \
                  --file "${{ inputs.dockerfile }}" \
                  --build-arg "${{ inputs.build_args }}" \
                  --tag "$IMAGE_URI" \
                  "${{ inputs.context }}"

              docker push "$IMAGE_URI"

              echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
              echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
