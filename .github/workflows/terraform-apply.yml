name: 'Terraform Apply'

on:
    push:
        branches:
            - main
        paths:
            - 'infra/environments/production/**'
            - 'infra/modules/**'
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: terraform-apply-production
    cancel-in-progress: false

jobs:
    terraform-apply:
        name: Apply Terraform Changes
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: infra/environments/production
                shell: bash
        environment: production
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v4
              with:
                  terraform_version: '1.15.0'

            - name: Terraform Init
              run: |
                  terraform init -input=false

            - name: Terraform Plan
              run: |
                  terraform plan -input=false -out=tfplan
                  terraform show -no-color tfplan > plan.txt

            - name: Terraform Apply
              run: |
                  terraform apply -input=false tfplan

            - name: Save Terraform Output
              run: |
                  terraform output -json > output.json

            - name: Upload Terraform Output
              uses: actions/upload-artifact@v7
              with:
                  name: terraform-production-output
                  path: |
                      infra/environments/production/output.json
                      infra/environments/production/plan.txt
                  retention-days: 7
