name: Continuous Integration

on:
    pull_request:
        branches:
            - main
        paths:
            - 'backend/**'
            - '.github/workflows/ci.yml'
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - '.github/workflows/ci.yml'

    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    backend:
        name: Backend Continuous Integration
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
                shell: bash

        steps:
            - name: Checkout code
              uses: actions/checkout@v7

            - name: Install Node.js and Setup PNPM
              uses: pnpm/setup@v1
              with:
                  runtime: node@lts
                  version: 11.9.0
                  install: false
                  cache: true
                  cache-dependency-path: backend/pnpm-lock.yaml

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ESLint
              run: pnpm lint

            - name: Run Unit Tests
              run: pnpm test

            - name: Run Type Checking
              run: pnpm type-check

            - name: Build Application
              run: pnpm build
