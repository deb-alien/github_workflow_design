name: 'Deploy Backend Application'
run-name: 'Deploy Backend Application - ${{ github.ref_name }}'

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - '.github/workflows/deploy.yaml'
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: deploy-production
    cancel-in-progress: true

jobs:
    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
                shell: bash
        outputs:
            image_uri: ${{ steps.docker.outputs.image_uri }}
            image_tag: ${{ steps.docker.outputs.image_tag }}
        environment: production
        steps:
            - uses: actions/checkout@v7
            - uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
                  aws-region: ${{ vars.AWS_REGION }}

            - uses: aws-actions/amazon-ecr-login@v2
              id: ecr-login

            - name: Build and Push Docker Image
              uses: ./.github/workflows/actions/docker-build
              id: docker
              with:
                  registry: ${{ steps.ecr-login.outputs.registry }}
                  repository: ${{ vars.AWS_ECR_REPOSITORY_NAME }}
                  image_tag: ${{ github.sha }}
                  context: .
                  build_args: 'NODE_ENV=production'

    deploy-production:
        runs-on: ubuntu-latest
        needs: build-and-push
        environment: production
        steps:
            - uses: actions/checkout@v7
            - uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Deploy to AWS ECS
              uses: ./.github/workflows/actions/ecs-deploy
              with:
                  task-definition-family: ${{ vars.AWS_ECS_TASK_DEFINITION_FAMILY }}
                  cluster: ${{ vars.AWS_ECS_CLUSTER_NAME }}
                  service: ${{ vars.AWS_ECS_SERVICE_NAME }}
                  container-name: ${{ vars.AWS_ECS_CONTAINER_NAME }}
                  image-uri: ${{ needs.build-and-push.outputs.image_uri }}
                  rollback-on-failure: true
