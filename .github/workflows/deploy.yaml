name: 'Deploy Backend Application'
run-name: 'Deploy Backend Application - ${{ github.ref_name }}'

on:
    push:
        branches:
            - main
        paths:
            - 'backend/**'
            - '.github/workflows/deploy.yaml'
    workflow_dispatch:

permissions:
    contents: read
    id-token: write

concurrency:
    group: deploy-production
    cancel-in-progress: true

jobs:
    build-and-push:
        name: Build and Push Docker Image
        runs-on: ubuntu-latest
        environment: production

        defaults:
            run:
                working-directory: backend
                shell: bash

        steps:
            - name: Checkout Code
              uses: actions/checkout@v7

            - name: Setup AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6
              with:
                  role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Login to Amazon ECR
              id: ecr-login
              uses: aws-actions/amazon-ecr-login@v2

            - name: Read Terraform Outputs
              id: terraform
              uses: ./.github/workflows/actions/terraform-outputs
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  workflow: .github/workflows/terraform-apply.yaml
                  branch: main

            - name: Build and Push Docker Image to ECR
              id: docker
              run: |
                  REGISTRY="${{ steps.ecr-login.outputs.registry }}"
                  REPOSITORY="${{ steps.terraform.outputs.ecr_repository_name }}"
                  SHORT_SHA="${GITHUB_SHA::7}"
                  
                  IMAGE_URI_TAGGED="$REGISTRY/$REPOSITORY:$SHORT_SHA"
                  
                  echo "Compiling container layers for: $IMAGE_URI_TAGGED..."
                  
                  docker build \
                    -t "$IMAGE_URI_TAGGED" \
                    -t "$IMAGE_URI_LATEST" \
                    -f Dockerfile \
                    --build-arg NODE_ENV=production \
                    .
                    
                  echo "Pushing compiled tags up to Amazon ECR registry storage..."
                  docker push "$IMAGE_URI_TAGGED"
                  
                  echo "image_uri=$IMAGE_URI_TAGGED" >> $GITHUB_OUTPUT

            - name: Deploy to Amazon ECS
              uses: ./.github/workflows/actions/ecs-deploy
              with:
                  cluster: ${{ steps.terraform.outputs.ecs_cluster_name }}
                  service: ${{ steps.terraform.outputs.ecs_service_name }}
                  task-definition-family: ${{ steps.terraform.outputs.ecs_task_definition_family }}
                  image-uri: ${{ steps.docker.outputs.image_uri }}
                  container-name: ${{ steps.terraform.outputs.container_name }}
